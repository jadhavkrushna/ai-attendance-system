{% extends "base.html" %}

{% block title %}Login using password | SnapClass{% endblock %}

{% block guest_content %}
<div style="min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 80px; position: relative; align-items: center;">

    <!-- Go Back to Home (Top Right) -->
    <div style="position: absolute; top: 40px; right: 80px;">
        <a href="/" class="btn-pill-pink" style="padding: 10px 24px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-arrow-left"></i> Go back to Home <span style="font-size: 0.75rem; opacity: 0.8; margin-left: 4px;">Ctrl + Backspace</span>
        </a>
    </div>

    <!-- Top Logo Block -->
    <div style="text-align: center; margin-top: 20px; display: flex; flex-direction: column; align-items: center;">
        <img src="{{ url_for('static', filename='img/app_logo.png') }}" alt="SnapClass Logo" style="height: 64px; border-radius: 16px; box-shadow: 0 8px 24px rgba(91, 91, 214, 0.15); margin-bottom: 12px;">
        <h1 style="font-family: 'Inter', sans-serif; font-size: 2.2rem; font-weight: 800; color: var(--text-dark); letter-spacing: -1px; text-transform: uppercase; line-height: 1.1;">
            SNAP<br>CLASS
        </h1>
    </div>

    <!-- Login Card (Image 2 Style) -->
    <div class="glass-card" style="width: 100%; max-width: 520px; padding: 40px; border-radius: 28px; box-shadow: var(--shadow-premium); background: rgba(255, 255, 255, 0.75); margin: 32px 0;">
        <div style="text-align: center; margin-bottom: 32px;">
            <h2 style="font-size: 1.95rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px;">Login using password</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 8px; font-weight: 500;">Welcome back! Please login to continue</p>
        </div>

        <form id="login-form-submit" action="/login" method="POST">
            <input type="hidden" name="role" value="teacher">
            
            <div class="form-group">
                <label for="login-username" style="font-weight: 600; font-size: 0.9rem; color: var(--text-dark); margin-bottom: 10px;">Enter username</label>
                <div class="input-container-icon">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" id="login-username" name="username" class="form-control-icon" placeholder="ananyaroy" required style="border-radius: 20px; background: rgba(255, 255, 255, 0.9); border-color: #EAE8FF;">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 36px;">
                <label for="login-password" style="font-weight: 600; font-size: 0.9rem; color: var(--text-dark); margin-bottom: 10px;">Enter password</label>
                <div class="input-container-icon">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="login-password" name="password" class="form-control-icon" placeholder="••••••••" required style="border-radius: 20px; background: rgba(255, 255, 255, 0.9); border-color: #EAE8FF; padding-right: 56px;">
                    <i class="fa-regular fa-eye" id="login-toggle-pw" onclick="toggleLoginPassword()" style="position: absolute; right: 20px; color: var(--text-muted); cursor: pointer; font-size: 1.1rem;"></i>
                </div>
            </div>

            <!-- Action Buttons Grid (Image 2 style) -->
            <div style="display: flex; gap: 16px; width: 100%;">
                <button type="submit" class="btn-pill-pink" style="flex: 1; justify-content: center; padding: 16px; font-size: 0.95rem; border-radius: 20px;">
                    <i class="fa-solid fa-right-to-bracket"></i> Login <span style="font-size: 0.75rem; opacity: 0.8; margin-left: 4px;">Ctrl + Enter</span>
                </button>
                <a href="/register" class="btn-pill" style="flex: 1; justify-content: center; padding: 16px; font-size: 0.95rem; border-radius: 20px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);">
                    <i class="fa-solid fa-user-plus"></i> Register Instead
                </a>
            </div>
        </form>
    </div>

    <!-- Floating 3D Icons matching theme -->
    <div class="fluent-bg-shapes">
        <!-- ID Card (top-left) -->
        <img class="shape-3d" src="{{ url_for('static', filename='img/icon_id_card.png') }}" style="top: 12%; left: 6%; width: 150px; animation-delay: 0s;">
        <!-- Face Scanner monitor (top-right) -->
        <img class="shape-3d" src="{{ url_for('static', filename='img/icon_face_scanner.png') }}" style="top: 12%; right: 6%; width: 140px; animation-delay: 1.5s;">
        <!-- AI Brain (bottom-left) -->
        <img class="shape-3d" src="{{ url_for('static', filename='img/icon_ai_brain.png') }}" style="bottom: 8%; left: 5%; width: 130px; animation-delay: 2.2s;">
        <!-- Cloud DB (bottom-right) -->
        <img class="shape-3d" src="{{ url_for('static', filename='img/icon_cloud_database.png') }}" style="bottom: 8%; right: 5%; width: 140px; animation-delay: 3s;">
    </div>

    <!-- Bottom Footer -->
    <div class="bottom-branding" style="margin-bottom: 20px;">
        Created with <i class="fa-solid fa-heart" style="color: var(--danger);"></i> by <strong>APNA COLLEGE</strong>
    </div>

</div>

<script>
    function toggleLoginPassword() {
        const pwInput = document.getElementById('login-password');
        const icon = document.getElementById('login-toggle-pw');
        if (pwInput.type === 'password') {
            pwInput.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            pwInput.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
{% endblock %}
